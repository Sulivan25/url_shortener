spring:
  datasource:
    # MODE=PostgreSQL lets H2 understand Postgres-specific SQL like INSERT ... ON CONFLICT,
    # so the click-bucket upsert queries work in dev/test without rewriting them.
    url: jdbc:h2:mem:urlshortener;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s