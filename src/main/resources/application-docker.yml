spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:urlshortener}
    username: ${DB_USERNAME:urlshortener}
    password: ${DB_PASSWORD:urlshortener}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: false

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2s

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-ttl-minutes: ${JWT_TTL_MINUTES:60}
      issuer: url-shortener
    bootstrap-admin:
      username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${BOOTSTRAP_ADMIN_PASSWORD}
